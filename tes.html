<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Keamanan - PT. UTPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        neutral: {
                            100: '#F2F3F5',
                            200: '#E5E6EB',
                            300: '#C9CDD4',
                            400: '#86909C',
                            500: '#4E5969',
                            600: '#272E3B',
                            700: '#1D2129',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .shadow-soft {
                box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.08);
            }
            .shadow-card {
                box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="font-inter bg-neutral-100 text-neutral-700 min-h-screen">

    <!-- Halaman Utama -->
    <div id="halamanUtama" class="w-full min-h-screen">
        <!-- Header Navigasi -->
        <header class="bg-white sticky top-0 z-40 border-b border-neutral-200 shadow-sm">
            <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-neutral-700">PT. UTPE | Keamanan</h1>
                        <p class="text-xs text-neutral-400">Sistem Pemantauan Kendaraan & Barang</p>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <div class="relative">
                        <input type="text" id="kotakPencarian" placeholder="Cari data..." class="pl-10 pr-4 py-2 w-60 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400"></i>
                    </div>
                    <button onclick="bukaEksporSemua()" class="bg-primary/10 text-primary hover:bg-primary/20 px-3 py-2 rounded-lg transition-all text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-file-export"></i>
                        <span class="hidden sm:inline">Ekspor Data</span>
                    </button>
                    <button onclick="bukaHapusSemua()" class="bg-danger/10 text-danger hover:bg-danger/20 px-3 py-2 rounded-lg transition-all text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i>
                        <span class="hidden sm:inline">Hapus Semua</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Konten Utama -->
        <main class="container mx-auto px-4 py-6">
            <!-- Statistik -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white rounded-xl p-5 shadow-card border border-neutral-100">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-sm text-neutral-400 mb-1">Total Masuk</p>
                            <h3 id="jmlCekin" class="text-3xl font-bold text-primary">0</h3>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-primary/10 text-primary flex items-center justify-center text-xl">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-card border border-neutral-100">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-sm text-neutral-400 mb-1">Total Keluar</p>
                            <h3 id="jmlCekout" class="text-3xl font-bold text-success">0</h3>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-success/10 text-success flex items-center justify-center text-xl">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-card border border-neutral-100">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-sm text-neutral-400 mb-1">Total Data</p>
                            <h3 id="jmlTotal" class="text-3xl font-bold text-warning">0</h3>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-warning/10 text-warning flex items-center justify-center text-xl">
                            <i class="fa-solid fa-database"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Navigasi -->
            <div class="bg-white rounded-xl shadow-card border border-neutral-100 mb-6 overflow-hidden">
                <div class="flex flex-wrap border-b border-neutral-200">
                    <button onclick="gantiTab('semua')" id="tabSemua" class="tab-btn active px-6 py-4 font-medium text-sm border-b-2 border-primary text-primary bg-primary/5">
                        <i class="fa-solid fa-list-check mr-2"></i>Semua Data
                    </button>
                    <button onclick="gantiTab('masuk')" id="tabMasuk" class="tab-btn px-6 py-4 font-medium text-sm border-b-2 border-transparent text-neutral-500 hover:bg-neutral-50">
                        <i class="fa-solid fa-circle-play mr-2"></i>Belum Keluar
                    </button>
                    <button onclick="gantiTab('keluar')" id="tabKeluar" class="tab-btn px-6 py-4 font-medium text-sm border-b-2 border-transparent text-neutral-500 hover:bg-neutral-50">
                        <i class="fa-solid fa-circle-check mr-2"></i>Sudah Keluar
                    </button>
                </div>

                <!-- Tabel Data -->
                <div class="overflow-x-auto scrollbar-hide">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-neutral-50 text-neutral-600 border-b border-neutral-200">
                                <th class="text-left px-4 py-3 font-semibold">WAKTU</th>
                                <th class="text-left px-4 py-3 font-semibold">NAMA</th>
                                <th class="text-left px-4 py-3 font-semibold">NO. POLISI</th>
                                <th class="text-left px-4 py-3 font-semibold">STATUS</th>
                                <th class="text-right px-4 py-3 font-semibold">AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="isiTabelData">
                            <tr>
                                <td colspan="5" class="px-4 py-8 text-center text-neutral-400">
                                    <i class="fa-solid fa-inbox text-4xl mb-2 block"></i>
                                    Memuat data dari database...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DETAIL DATA -->
    <div id="modalDetail" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" id="kontenDetail">
        </div>
    </div>

    <!-- MODAL KONFIRMASI HAPUS -->
    <div id="modalHapus" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl max-w-md w-full shadow-2xl p-6">
            <div class="w-14 h-14 rounded-full bg-danger/10 text-danger flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-lg font-bold text-center mb-2" id="judulHapus">Hapus Data</h3>
            <p class="text-neutral-500 text-center mb-6" id="teksHapus">Apakah kamu yakin?</p>
            <div class="flex gap-3">
                <button onclick="tutupModal('modalHapus')" class="flex-1 py-2.5 rounded-lg border border-neutral-200 text-neutral-600 hover:bg-neutral-50 font-medium transition-all">Batal</button>
                <button id="btnKonfirmasiHapus" class="flex-1 py-2.5 rounded-lg bg-danger text-white hover:bg-danger/90 font-medium transition-all">Hapus</button>
            </div>
        </div>
    </div>

    <!-- MODAL EKSPOR -->
    <div id="modalEkspor" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl max-w-md w-full shadow-2xl p-6">
            <div class="w-14 h-14 rounded-full bg-primary/10 text-primary flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-file-export"></i>
            </div>
            <h3 class="text-lg font-bold text-center mb-4">Ekspor Data</h3>
            <div class="space-y-3">
                <button onclick="exportPDFByStatus('semua')" class="w-full py-2.5 rounded-lg bg-primary/5 hover:bg-primary/10 text-primary font-medium transition-all">
                    <i class="fa-solid fa-download mr-2"></i> Ekspor Semua Data
                </button>
                <button onclick="exportPDFByStatus('masuk')" class="w-full py-2.5 rounded-lg bg-warning/5 hover:bg-warning/10 text-warning font-medium transition-all">
                    <i class="fa-solid fa-download mr-2"></i> Ekspor Belum Keluar
                </button>
                <button onclick="exportPDFByStatus('keluar')" class="w-full py-2.5 rounded-lg bg-success/5 hover:bg-success/10 text-success font-medium transition-all">
                    <i class="fa-solid fa-download mr-2"></i> Ekspor Sudah Keluar
                </button>
                <button onclick="tutupModal('modalEkspor')" class="w-full py-2.5 rounded-lg border border-neutral-200 text-neutral-600 hover:bg-neutral-50 font-medium transition-all mt-2">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <!-- NOTIFIKASI -->
    <div id="kotakNotif" class="fixed top-4 right-4 z-[60] transition-all duration-300 translate-x-[150%]">
        <div class="bg-white rounded-lg shadow-xl border border-neutral-100 p-4 flex items-center gap-3 max-w-xs">
            <div id="ikonNotif" class="text-xl"></div>
            <div>
                <h4 id="judulNotif" class="font-semibold text-sm"></h4>
                <p id="isiNotif" class="text-xs text-neutral-500"></p>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI FIREBASE - SUDAH SESUAI
        const firebaseConfig = {
            apiKey: "AIzaSyCUA0AH0bXHcm3w85wrRi1uBGJBkB4ClJg",
            authDomain: "sistemkeamanan-9a570.firebaseapp.com",
            databaseURL: "https://sistemkeamanan-9a570-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sistemkeamanan-9a570",
            storageBucket: "sistemkeamanan-9a570.appspot.com",
            messagingSenderId: "27616356342",
            appId: "1:27616356342:web:536535cb642902dd8f9350",
            measurementId: "G-MKYG3HKFKN"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const refData = db.ref("data_vendor"); // PENTING: Pastikan nama folder ini benar

        // Variabel Global
        let semuaData = [];
        let tabAktif = 'semua';
        let idHapusSekarang = null;

        // JALANKAN SAAT HALAMAN DIBUKA
        document.addEventListener('DOMContentLoaded', () => {
            bacaDataSemua();
            pantauPencarian();
        });

        // FUNGSI UTAMA BACA DATA
        function bacaDataSemua() {
            refData.on('value', (snap) => {
                const dataMentah = snap.val();
                semuaData = [];

                console.log("RAW DATA DARI DB:", dataMentah); // Cek data masuk atau tidak di konsol

                if (dataMentah) {
                    Object.keys(dataMentah).forEach(kunci => {
                        const item = dataMentah[kunci];
                        // DETEKSI OTOMATIS SEMUA NAMA KOLOM YANG MUNGKIN ADA
                        const dataBersih = {
                            id: kunci,
                            // Nama Vendor
                            nama: item.nama_vendor || item.nama || item.nama_pengunjung || item.nama_user || "-",
                            // Kendaraan / Plat Nomor
                            kendaraan: item.no_polisi || item.plat_nomor || item.kendaraan || item.vehicles || item.plat || "-",
                            // Keperluan / Pekerjaan
                            keperluan: item.keperluan || item.pekerjaan || item.tujuan || item.kebutuhan || "-",
                            // Pos Masuk
                            pos_masuk: item.pos || item.pos_masuk || item.pintu || item.lokasi || item.titik_masuk || "-",
                            // Waktu Masuk
                            tanggal_masuk: item.tanggal || item.tgl_masuk || item.tanggal_masuk || "-",
                            jam_masuk: item.jam_masuk || item.jam || item.waktu_masuk || "-",
                            // Waktu Keluar
                            tanggal_keluar: item.tanggal_keluar || item.tgl_keluar || "-",
                            jam_keluar: item.jam_keluar || item.waktu_keluar || "-",
                            // Status (deteksi semua kemungkinan tulisan)
                            status: item.status || item.cekout || item.keadaan || 
                                    (item.jam_keluar ? "SUDAH KELUAR" : "BELUM KELUAR"),
                            // Daftar Barang
                            barang: item.barang || item.peralatan || item.daftar_barang || [],
                            // Foto
                            foto: item.foto || item.dokumentasi || item.gambar || [],
                            // Tanda Tangan
                            ttd_vendor: item.ttd_vendor || item.ttd_pengunjung || item.tanda_tangan || "",
                            ttd_security: item.ttd_security || item.ttd_petugas || item.tanda_tangan_security || "",
                            // Data Mentah Asli (cadangan)
                            _asli: item
                        };
                        semuaData.push(dataBersih);
                    });
                }

                console.log("DATA YANG DIPROSES:", semuaData); // Cek hasil proses data
                hitungStatistik();
                tampilkanDataKeTabel();
            }, (err) => {
                // Jika ada error koneksi
                document.getElementById('isiTabelData').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-4 py-8 text-center text-red-500">
                            <i class="fa-solid fa-triangle-exclamation text-4xl mb-2 block"></i>
                            Gagal ambil data: ${err.message}<br>
                            Cek koneksi internet atau pengaturan database.
                        </td>
                    </tr>
                `;
            });
        }

        // Hitung jumlah statistik
        function hitungStatistik() {
            const total = semuaData.length;
            const belumKeluar = semuaData.filter(d => 
                d.status.includes("BELUM") || d.status.includes("belum") || d.status.includes("OUT") === false
            ).length;
            const sudahKeluar = semuaData.filter(d => 
                d.status.includes("SUDAH") || d.status.includes("sudah") || d.status.includes("OUT")
            ).length;

            document.getElementById('jmlTotal').textContent = total;
            document.getElementById('jmlCekin').textContent = belumKeluar;
            document.getElementById('jmlCekout').textContent = sudahKeluar;
        }

        // Tampilkan data ke tabel
        function tampilkanDataKeTabel(kataCari = "") {
            const wadah = document.getElementById('isiTabelData');
            let dataTampil = semuaData;

            // Filter pencarian
            if (kataCari.trim() !== "") {
                const kunci = kataCari.toLowerCase();
                dataTampil = semuaData.filter(d => {
                    const teksGabung = `${d.nama} ${d.kendaraan} ${d.pos_masuk} ${d.tanggal_masuk}`.toLowerCase();
                    return teksGabung.includes(kunci);
                });
            }

            // Filter tab aktif
            if (tabAktif === 'masuk') {
                dataTampil = dataTampil.filter(d => 
                    d.status.includes("BELUM") || d.status.includes("belum") || d.status.includes("OUT") === false
                );
            } else if (tabAktif === 'keluar') {
                dataTampil = dataTampil.filter(d => 
                    d.status.includes("SUDAH") || d.status.includes("sudah") || d.status.includes("OUT")
                );
            }

            // Jika kosong
            if (dataTampil.length === 0) {
                wadah.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-4 py-8 text-center text-neutral-400">
                            <i class="fa-solid fa-inbox text-4xl mb-2 block"></i>
                            Tidak ada data yang ditemukan
                        </td>
                    </tr>
                `;
                return;
            }

            // Buat baris data
            let html = "";
            dataTampil.forEach(d => {
                const waktuTampil = d.tanggal_masuk !== "-" ? `${d.tanggal_masuk} ${d.jam_masuk}` : "-";
                
                let labelStatus = "";
                if (d.status.includes("SUDAH") || d.status.includes("OUT")) {
                    labelStatus = `<span class="px-2 py-1 rounded-full bg-success/10 text-success text-xs font-medium">SUDAH KELUAR</span>`;
                }

                else {
                    labelStatus = `<span class="px-2 py-1 rounded-full bg-warning/10 text-warning text-xs font-medium">BELUM KELUAR</span>`;
                }

                html += `
                <tr class="border-b border-neutral-100 hover:bg-neutral-50 transition-all">
                    <td class="px-4 py-3">${waktuTampil}</td>
                    <td class="px-4 py-3 font-medium">${d.nama}</td>
                    <td class="px-4 py-3">${d.kendaraan}</td>
                    <td class="px-4 py-3">${labelStatus}</td>
                    <td class="px-4 py-3 text-right">
                        <div class="flex justify-end gap-1">
                            <button onclick="bukaDetail('${d.id}')" class="p-1.5 text-primary hover:bg-primary/10 rounded transition-all" title="Lihat Detail">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                            <button onclick="exportPDFSatuan('${d.id}')" class="p-1.5 text-success hover:bg-success/10 rounded transition-all" title="Unduh PDF">
                                <i class="fa-solid fa-file-pdf"></i>
                            </button>
                            <button onclick="konfirmasiHapus('${d.id}')" class="p-1.5 text-danger hover:bg-danger/10 rounded transition-all" title="Hapus Data">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                `;
            });

            wadah.innerHTML = html;
        }

        // Ganti Tab
        function gantiTab(tab) {
            tabAktif = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'border-primary', 'text-primary', 'bg-primary/5');
                btn.classList.add('border-transparent', 'text-neutral-500', 'hover:bg-neutral-50');
            });

            const aktif = document.getElementById('tab' + (tab === 'semua' ? 'Semua' : tab === 'masuk' ? 'Masuk' : 'Keluar'));
            aktif.classList.add('active', 'border-primary', 'text-primary', 'bg-primary/5');
            aktif.classList.remove('border-transparent', 'text-neutral-500', 'hover:bg-neutral-50');

            tampilkanDataKeTabel(document.getElementById('kotakPencarian').value);
        }

        // Fungsi Pencarian
        function pantauPencarian() {
            const input = document.getElementById('kotakPencarian');
            input.addEventListener('input', () => {
                tampilkanDataKeTabel(input.value);
            });
        }

        // Buka & Tutup Modal
        function bukaModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function tutupModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.body.style.overflow = 'auto';
            idHapusSekarang = null;
        }

        // Lihat Detail Data
        function bukaDetail(id) {
            const data = semuaData.find(d => d.id === id);
            if (!data) return;

            // Daftar Barang
            let htmlBarang = "";
            if (Array.isArray(data.barang) && data.barang.length > 0) {
                htmlBarang = `
                <div class="overflow-x-auto mt-2">
                    <table class="w-full text-sm border-collapse">
                        <thead>
                            <tr class="bg-neutral-50">
                                <th class="border border-neutral-200 px-3 py-2 text-left">No</th>
                                <th class="border border-neutral-200 px-3 py-2 text-left">Nama Barang</th>
                                <th class="border border-neutral-200 px-3 py-2 text-center">Masuk</th>
                                <th class="border border-neutral-200 px-3 py-2 text-center">Keluar</th>
                                <th class="border border-neutral-200 px-3 py-2 text-left">Keterangan</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.barang.map((brg, i) => `
                            <tr>
                                <td class="border border-neutral-200 px-3 py-2 text-center">${i+1}</td>
                                <td class="border border-neutral-200 px-3 py-2">${brg.nama_barang || brg.nama || brg.deskripsi || "-"}</td>
                                <td class="border border-neutral-200 px-3 py-2 text-center">${brg.jumlah_masuk || brg.jumlah || "-"}</td>
                                <td class="border border-neutral-200 px-3 py-2 text-center">${brg.jumlah_keluar || "-"}</td>
                                <td class="border border-neutral-200 px-3 py-2">${brg.keterangan || "-"}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            } else {
                htmlBarang = `<p class="text-sm text-neutral-500 mt-2">Tidak ada data barang / peralatan</p>`;
            }

            // Foto
            let htmlFoto = "";
            if (Array.isArray(data.foto) && data.foto.length > 0) {
                htmlFoto = `<div class="grid grid-cols-2 md:grid-cols-3 gap-2 mt-2">${data.foto.map(f => `<img src="${f}" class="w-full h-32 object-cover rounded-lg border border-neutral-200" alt="Foto">`).join('')}</div>`;
            } else {
                htmlFoto = `<p class="text-sm text-neutral-500 mt-2">Tidak ada foto dokumentasi</p>`;
            }

            // Tanda Tangan
            let htmlTtd = "";
            if (data.ttd_vendor || data.ttd_security) {
                htmlTtd = `<div class="grid grid-cols-2 gap-4 mt-2">
                    ${data.ttd_vendor ? `<div><p class="text-xs text-neutral-500 mb-1">Tanda Tangan Vendor / Pengunjung</p><img src="${data.ttd_vendor}" class="w-full h-24 object-contain bg-white border rounded-lg"></div>` : ""}
                    ${data.ttd_security ? `<div><p class="text-xs text-neutral-500 mb-1">Tanda Tangan Petugas Keamanan</p><img src="${data.ttd_security}" class="w-full h-24 object-contain bg-white border rounded-lg"></div>` : ""}
                </div>`;
            } else {
                htmlTtd = `<p class="text-sm text-neutral-500 mt-2">Belum ada tanda tangan</p>`;
            }

            const html = `
            <div class="p-5 border-b border-neutral-200 flex items-center justify-between">
                <h3 class="text-lg font-bold">Detail Data</h3>
                <button onclick="tutupModal('modalDetail')" class="text-neutral-400 hover:text-neutral-700">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-5 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div>
                        <p class="text-neutral-500 mb-1">Nama Lengkap</p>
                        <p class="font-medium">${data.nama}</p>
                    </div>
                    <div>
                        <p class="text-neutral-500 mb-1">Keperluan / Pekerjaan</p>
                        <p class="font-medium">${data.keperluan}</p>
                    </div>
                    <div>
                        <p class="text-neutral-500 mb-1">Nomor Polisi / Kendaraan</p>
                        <p class="font-medium">${data.kendaraan}</p>
                    </div>
                    <div>
                        <p class="text-neutral-500 mb-1">Pos / Pintu Masuk</p>
                        <p class="font-medium">${data.pos_masuk}</p>
                    </div>
                    <div>
                        <p class="text-neutral-500 mb-1">Waktu Masuk</p>
                        <p class="font-medium">${data.tanggal_masuk} ${data.jam_masuk}</p>
                    </div>
                    <div>
                        <p class="text-neutral-500 mb-1">Waktu Keluar</p>
                        <p class="font-medium">${data.tanggal_keluar !== "-" ? data.tanggal_keluar + " " + data.jam_keluar : "-"}</p>
                    </div>
                    <div class="md:col-span-2">
                        <p class="text-neutral-500 mb-1">Status</p>
                        <p class="font-bold text-lg ${data.status.includes("SUDAH") ? 'text-success' : 'text-warning'}">${data.status}</p>
                    </div>
                </div>

                <div>
                    <p class="font-semibold text-neutral-700">Daftar Barang / Peralatan</p>
                    ${htmlBarang}
                </div>

                <div>
                    <p class="font-semibold text-neutral-700">Foto Dokumentasi</p>
                    ${htmlFoto}
                </div>

                <div>
                    <p class="font-semibold text-neutral-700">Tanda Tangan</p>
                    ${htmlTtd}
                </div>
            </div>
            <div class="p-5 border-t border-neutral-200 flex justify-end">
                <button onclick="exportPDFSatuan('${data.id}')" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 text-sm">
                    <i class="fa-solid fa-file-pdf mr-2"></i> Unduh PDF
                </button>
            </div>
            `;

            document.getElementById('kontenDetail').innerHTML = html;
            bukaModal('modalDetail');
        }

        // Hapus Data
        function konfirmasiHapus(id) {
            idHapusSekarang = id;
            document.getElementById('judulHapus').textContent = "Hapus Data";
            document.getElementById('teksHapus').textContent = "Yakin ingin menghapus data ini? Tindakan tidak bisa dikembalikan.";
            document.getElementById('btnKonfirmasiHapus').onclick = hapusSatuData;
            bukaModal('modalHapus');
        }

        async function hapusSatuData() {
            if (!idHapusSekarang) return;
            try {
                await refData.child(idHapusSekarang).remove();
                tampilkanNotif("Berhasil", "Data telah dihapus!", "success");
            } catch (err) {
                tampilkanNotif("Gagal", "Error: " + err.message, "danger");
            }            tutupModal('modalHapus');
        }

        function bukaHapusSemua() {
            document.getElementById('judulHapus').textContent = "Hapus SEMUA Data";
            document.getElementById('teksHapus').textContent = "PERINGATAN! Semua data yang ada di database akan dihapus permanen dan TIDAK BISA dikembalikan lagi. Yakin ingin melanjutkan?";
            document.getElementById('btnKonfirmasiHapus').onclick = hapusSemuaData;
            bukaModal('modalHapus');
        }

        async function hapusSemuaData() {
            try {
                await refData.remove();
                tampilkanNotif("Berhasil", "Semua data telah dihapus dari database!", "success");
            } catch (err) {
                tampilkanNotif("Gagal", "Error: " + err.message, "danger");
            }
            tutupModal('modalHapus');
        }

        // EKSPOR PDF
        function bukaEksporSemua() {
            bukaModal('modalEkspor');
        }

        async function eksekusiPDF(elemen, namaFile) {
            const { jsPDF } = window.jspdf;
            const kanvas = await html2canvas(elemen, { 
                scale: 2, 
                useCORS: true,
                logging: false,
                allowTaint: true
            });
            const dataGambar = kanvas.toDataURL('image/png');
            
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });

            const lebarPDF = 280;
            const tinggiPDF = kanvas.height * lebarPDF / kanvas.width;
            pdf.addImage(dataGambar, 'PNG', 10, 10, lebarPDF, tinggiPDF);
            pdf.save(namaFile + '.pdf');
        }

        function exportPDFSatuan(id) {
            tutupModal('modalDetail');
            const data = semuaData.find(d => d.id === id);
            if (!data) return;

            const elemen = document.createElement('div');
            elemen.style.width = '800px';
            elemen.style.background = 'white';
            elemen.style.padding = '20px';
            elemen.style.fontFamily = 'Arial, sans-serif';
            elemen.style.fontSize = '14px';
            elemen.style.color = '#000';

            let htmlBarang = "";
            if (Array.isArray(data.barang) && data.barang.length > 0) {
                htmlBarang = `
                <table style="width:100%; border:1px solid #ccc; border-collapse:collapse; margin:8px 0;">
                    <thead>
                        <tr style="background:#f0f0f0;">
                            <th style="border:1px solid #ccc; padding:6px; text-align:left;">No</th>
                            <th style="border:1px solid #ccc; padding:6px; text-align:left;">Nama Barang</th>
                            <th style="border:1px solid #ccc; padding:6px; text-align:center;">Jumlah Masuk</th>
                            <th style="border:1px solid #ccc; padding:6px; text-align:center;">Jumlah Keluar</th>
                            <th style="border:1px solid #ccc; padding:6px; text-align:left;">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.barang.map((brg, i) => `
                        <tr>
                            <td style="border:1px solid #ccc; padding:6px; text-align:center;">${i+1}</td>
                            <td style="border:1px solid #ccc; padding:6px;">${brg.nama_barang || brg.nama || "-"}</td>
                            <td style="border:1px solid #ccc; padding:6px; text-align:center;">${brg.jumlah_masuk || brg.jumlah || "-"}</td>
                            <td style="border:1px solid #ccc; padding:6px; text-align:center;">${brg.jumlah_keluar || "-"}</td>
                            <td style="border:1px solid #ccc; padding:6px;">${brg.keterangan || "-"}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>`;
            } else {
                htmlBarang = `<p style="border:1px solid #ccc; padding:10px;">Tidak ada data barang / peralatan</p>`;
            }

            let htmlFoto = "";
            if (Array.isArray(data.foto) && data.foto.length > 0) {
                htmlFoto = `<div style="display:flex; gap:10px; flex-wrap:wrap; margin:8px 0;">
                    ${data.foto.map(f => `<img src="${f}" style="width:200px; height:auto; border:1px solid #ccc;" alt="Foto">`).join('')}
                </div>`;
            }

            let htmlTtd = "";
            if (data.ttd_vendor || data.ttd_security) {
                htmlTtd = `<div style="display:flex; gap:40px; margin-top:20px;">
                    ${data.ttd_vendor ? `<div><p style="font-weight:bold; margin-bottom:6px;">Tanda Tangan Vendor</p><img src="${data.ttd_vendor}" style="width:180px; height:auto; border:1px solid #ccc;"></div>` : ""}
                    ${data.ttd_security ? `<div><p style="font-weight:bold; margin-bottom:6px;">Tanda Tangan Petugas</p><img src="${data.ttd_security}" style="width:180px; height:auto; border:1px solid #ccc;"></div>` : ""}
                </div>`;
            }

            elemen.innerHTML = `
                <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:20px;">
                    <h1 style="font-size:20px; font-weight:bold; margin:0;">LAPORAN PENGECEKAN VENDOR / KENDARAAN</h1>
                    <h2 style="font-size:16px; margin:4px 0;">PT. UTPE - BAGIAN KEAMANAN</h2>
                </div>

                <table style="width:100%; border-collapse:collapse; margin-bottom:15px;">
                    <tr><td style="width:30%; font-weight:bold; padding:4px 0;">Nama Lengkap</td><td>: ${data.nama}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Keperluan / Pekerjaan</td><td>: ${data.keperluan}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Nomor Polisi / Kendaraan</td><td>: ${data.kendaraan}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Pos / Pintu Masuk</td><td>: ${data.pos_masuk}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Waktu Masuk</td><td>: ${data.tanggal_masuk} ${data.jam_masuk}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Waktu Keluar</td><td>: ${data.tanggal_keluar !== "-" ? data.tanggal_keluar + " " + data.jam_keluar : "-"}</td></tr>
                    <tr><td style="font-weight:bold; padding:4px 0;">Status</td><td>: ${data.status}</td></tr>
                </table>

                <div style="margin-bottom:15px;">
                    <p style="font-weight:bold; margin-bottom:5px;">Daftar Barang / Peralatan:</p>
                    ${htmlBarang}
                </div>

                <div style="margin-bottom:15px;">
                    <p style="font-weight:bold; margin-bottom:5px;">Foto Dokumentasi:</p>
                    ${htmlFoto}
                </div>

                ${htmlTtd}

                <div style="text-align:right; margin-top:40px;">
                    <p>Jakarta, ${new Date().toLocaleDateString('id-ID')}</p>
                    <br><br>
                    <p style="font-weight:bold;">( _________________________ )</p>
                    <p>Petugas Keamanan</p>
                </div>
            `;

            eksekusiPDF(elemen, `Laporan_${data.kendaraan || 'Data'}_${Date.now()}`);
        }

        function exportPDFByStatus(jenis) {
            tutupModal('modalEkspor');
            let dataFilter = semuaData;
            let judul = "";

            if (jenis === 'masuk') {
                dataFilter = semuaData.filter(d => d.status.includes("BELUM"));
                judul = "Laporan_Data_Belum_Keluar";
            } else if (jenis === 'keluar') {
                dataFilter = semuaData.filter(d => d.status.includes("SUDAH"));
                judul = "Laporan_Data_Sudah_Keluar";
            } else {
                judul = "Laporan_Seluruh_Data_Keamanan";
            }

            if (dataFilter.length === 0) {
                tampilkanNotif("Info", "Tidak ada data untuk diekspor", "warning");
                return;
            }

            const elemen = document.createElement('div');
            elemen.style.width = '800px';
            elemen.style.background = 'white';
            elemen.style.padding = '20px';
            elemen.style.fontFamily = 'Arial, sans-serif';
            elemen.style.fontSize = '13px';

            let isiTabel = "";
            dataFilter.forEach((d, i) => {
                const waktu = `${d.tanggal_masuk} ${d.jam_masuk}`;
                isiTabel += `
                <tr>
                    <td style="border:1px solid #000; padding:5px; text-align:center;">${i+1}</td>
                    <td style="border:1px solid #000; padding:5px;">${d.nama}</td>
                    <td style="border:1px solid #000; padding:5px;">${d.kendaraan}</td>
                    <td style="border:1px solid #000; padding:5px;">${d.pos_masuk}</td>
                    <td style="border:1px solid #000; padding:5px;">${waktu}</td>
                    <td style="border:1px solid #000; padding:5px;">${d.status}</td>
                </tr>`;
            });

            elemen.innerHTML = `
                <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:20px;">
                    <h1 style="font-size:18px; font-weight:bold; margin:0;">LAPORAN REKAP DATA VENDOR / KENDARAAN</h1>
                    <h3 style="font-size:14px; margin:2px 0;">PT. UTPE - BAGIAN KEAMANAN</h3>
                </div>

                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background:#f0f0f0;">
                            <th style="border:1px solid #000; padding:6px; width:8%;">No</th>
                            <th style="border:1px solid #000; padding:6px; width:25%;">Nama</th>
                            <th style="border:1px solid #000; padding:6px; width:15%;">No. Polisi</th>
                            <th style="border:1px solid #000; padding:6px; width:12%;">Pos</th>
                            <th style="border:1px solid #000; padding:6px; width:22%;">Waktu</th>
                            <th style="border:1px solid #000; padding:6px; width:18%;">Status</th>
                        </tr>
                    </thead>
                    <tbody>${isiTabel}</tbody>
                </table>

                <div style="text-align:right; margin-top:40px;">
                    <p>Jakarta, ${new Date().toLocaleDateString('id-ID')}</p>
                    <br><br>
                    <p style="font-weight:bold;">( _________________________ )</p>
                    <p>Petugas Keamanan</p>
                </div>
            `;

            eksekusiPDF(elemen, judul);
        }

        // NOTIFIKASI
        function tampilkanNotif(judul, pesan, tipe = 'success') {
            const kotak = document.getElementById('kotakNotif');
            const ikon = document.getElementById('ikonNotif');
            const jdl = document.getElementById('judulNotif');
            const isi = document.getElementById('isiNotif');

            jdl.textContent = judul;
            isi.textContent = pesan;

            if (tipe === 'success') {
                ikon.className = 'fa-solid fa-check-circle text-xl text-green-500';
            } else if (tipe === 'danger') {
                ikon.className = 'fa-solid fa-exclamation-circle text-xl text-red-500';
            } else if (tipe === 'warning') {
                ikon.className = 'fa-solid fa-triangle-exclamation text-xl text-yellow-500';
            }

            kotak.classList.remove('translate-x-[150%]');
            kotak.classList.add('translate-x-0');

            setTimeout(() => {
                kotak.classList.remove('translate-x-0');
                kotak.classList.add('translate-x-[150%]');
            }, 3000);
        }
    </script>

</body>
